<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5B21B6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="48" height="48" rx="10" fill="url(#bg)"/>
  <!-- Agenda item lines -->
  <rect x="9" y="11" width="24" height="4.5" rx="2.25" fill="white"/>
  <rect x="9" y="19.5" width="18" height="4.5" rx="2.25" fill="white" fill-opacity="0.75"/>
  <rect x="9" y="28" width="21" height="4.5" rx="2.25" fill="white" fill-opacity="0.75"/>
  <!-- Clock badge (bottom-right) -->
  <circle cx="36" cy="36" r="9.5" fill="#4C1D95"/>
  <circle cx="36" cy="36" r="8" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Clock hands -->
  <line x1="36" y1="36" x2="36" y2="30.5" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="36" y1="36" x2="40.5" y2="36" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="36" cy="36" r="1.3" fill="white"/>
</svg>
